name: Python Lint & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ruff / black チェック
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install ruff black pytest boto3 pytest-cov

      - name: ruff（構文チェック・未使用 import 検出）
        run: ruff check app/ lambda/

      - name: black（フォーマットチェック）
        run: black --check app/ lambda/

      - name: pytest（Lambda ユニットテスト）
        run: pytest lambda/test_index.py -v --cov=lambda --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: lambda
          fail_ci_if_error: false

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_117,CKV_AWS_272,
            CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_119,CKV_AWS_173,
            CKV_AWS_158,CKV_AWS_338,
            CKV_AWS_290,CKV_AWS_355,
            CKV_AWS_373,CKV_AWS_383,
            CKV_AWS_258,CKV_AWS_301
          output_format: cli
